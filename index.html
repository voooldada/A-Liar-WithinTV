<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>A Liar Within — TV Broadcast</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(rgba(0,0,0,0.70), rgba(0,0,0,0.70)), url('gameart/CityDay.jpeg') center/cover no-repeat;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .tv-container {
      text-align: center;
      background: rgba(5, 12, 18, 0.85);
      padding: 42px 34px;
      border-radius: 18px;
      max-width: 640px;
      width: 100%;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    h1 {
      font-size: 34px;
      margin-bottom: 16px;
      color: #ffcd4a;
    }
    /* QR visuals removed: TV now connects via room code */
    .instructions {
      margin-top: 20px;
      color: #ccc;
      font-size: 14px;
      line-height: 1.6;
    }
    .instruction-step {
      margin: 10px 0;
      padding: 10px;
      background: #333;
      border-left: 3px solid #ff4444;
    }
    .tv-status {
      margin-top: 20px;
      padding: 10px;
      background: #2a2a2a;
      border-radius: 6px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="tv-container">
    <h1>🎮 A Liar Within</h1>
    <h2 style="font-size:18px;margin-bottom:10px;color:#ff9900;">Live Broadcast</h2>
    
    <div class="instructions">
      <div class="instruction-step">
        <strong>1.</strong> Open the game on your mobile device
      </div>
      <div class="instruction-step">
        <strong>2.</strong> Tap "Connect to TV" from the lobby
      </div>
      <div class="instruction-step">
        <strong>3.</strong> Paste the room code in the field below
      </div>
      <div class="instruction-step">
        <strong>4.</strong> Click "Connect as Spectator" to show the lobby and phases
      </div>
    </div>

    <div class="tv-status">
      Status: <span id="tv-connection-status">Ready to broadcast</span>
    </div>

    <div style="margin-top:18px;">
      <label style="display:block;margin-bottom:8px;color:#ccc;">Room Code</label>
      <input id="tv-room-input" placeholder="Paste the room code (eg: ABCD1234)" style="width:100%;padding:10px;border-radius:6px;border:1px solid #444;background:#111;color:#fff;margin-bottom:8px;" />
      <div style="display:flex;gap:8px;">
        <button id="tv-connect-button" style="flex:1;padding:10px;border-radius:6px;border:none;background:#ff4444;color:#fff;">Connect as Spectator</button>
      </div>
      <div id="tv-connect-msg" style="margin-top:8px;color:#888;font-size:13px;"></div>
    </div>
  </div>

  <script>
    const backgroundImages = [
      'gameart/CityDay.jpeg',
      'gameart/CityNight.jpeg',
      'gameart/Night.jpeg',
      'gameart/DayPhase.jpeg',
      'gameart/Voting.jpeg'
    ];
    const selectedBackground = backgroundImages[Math.floor(Math.random() * backgroundImages.length)];
    document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.70), rgba(0,0,0,0.70)), url('${selectedBackground}')`;
    document.body.style.backgroundSize = 'cover';
    document.body.style.backgroundPosition = 'center';

    // Eventos do UI
    document.getElementById('tv-connect-button').addEventListener('click', () => {
      const room = document.getElementById('tv-room-input').value.toUpperCase().trim();
      const msg = document.getElementById('tv-connect-msg');
      if (!room) { msg.textContent = 'Digite o código da sala.'; return; }
      // Redirecionar para spectator.html com room (a página do espectador faz o auto-join)
      const url = 'spectator.html?room=' + encodeURIComponent(room);
      window.location.href = url;
    });
  </script>
</body>
</html>
