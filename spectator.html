<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>A Liar Within — Espectador</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    #spectator-join {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      display: grid;
      place-items: center;
      z-index: 9999;
    }
    .spectator-join-box {
      background: #222;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      max-width: 400px;
      color: #fff;
    }
    .spectator-join-box h2 {
      margin-bottom: 20px;
      color: #ff9900;
    }
    .spectator-join-box input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #444;
      background: #333;
      color: #fff;
      font-size: 16px;
      border-radius: 6px;
      text-transform: uppercase;
    }
    .spectator-join-box input::placeholder {
      color: #666;
    }
    .spectator-join-box button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #ff4444;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }
    .spectator-join-box button:hover {
      background: #ff6666;
    }
    .spectator-join-box button:disabled {
      background: #666;
      cursor: not-allowed;
    }
    .spectator-join-box .error {
      color: #ff6666;
      margin-top: 10px;
      font-size: 14px;
    }
    .spectator-join-box .info {
      color: #888;
      font-size: 12px;
      margin-top: 15px;
    }
    #spectator-content {
      display: none;
    }
    .spectator-header {
      background: #1a1a1a;
      padding: 15px;
      text-align: center;
      border-bottom: 2px solid #ff4444;
    }
    .spectator-header h1 {
      margin: 0;
      color: #ff9900;
      font-size: 20px;
    }
    .spectator-header p {
      margin: 5px 0 0;
      color: #888;
      font-size: 12px;
    }
    .spectator-main {
      padding: 20px;
    }
    .spectator-panel {
      background: #222;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 15px;
      border-left: 3px solid #ff4444;
    }
    .spectator-panel h3 {
      color: #ff9900;
      margin-bottom: 10px;
      font-size: 14px;
    }
    #spectator-players {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    #spectator-players li {
      padding: 8px;
      background: #333;
      margin: 5px 0;
      border-radius: 4px;
      font-size: 14px;
    }
    #spectator-players li.eliminated {
      opacity: 0.5;
      text-decoration: line-through;
    }
  </style>
</head>
<body style="background:#1a1a1a;">
  <!-- Modal de entrada -->
  <div id="spectator-join" class="spectator-join-box" style="position:static;background:transparent;padding:0;grid-column:unset;place-items:unset;display:grid;min-height:100vh;">
    <div class="spectator-join-box">
      <h2>🎮 Espectador</h2>
      <p style="color:#ccc;margin-bottom:20px;">Digite o código da sala para assistir</p>
      
      <input 
        id="spectator-room-input" 
        type="text" 
        placeholder="Ex: ABCD1234"
        autocomplete="off"
        maxlength="8"
      />
      
      <button id="spectator-join-btn" onclick="joinAsSpectator()">Entrar</button>
      
      <div class="error" id="spectator-error" style="display:none;"></div>
      <div class="info">
        💡 Código fornecido pelo host do jogo
      </div>
    </div>
  </div>

  <!-- Conteúdo do espectador -->
  <div id="spectator-content" style="display:none;min-height:100vh;color:#fff;">
    <div class="spectator-header">
      <h1>🎮 A Liar Within — Espectador</h1>
      <p>Sala: <strong id="spectator-room-code">—</strong></p>
    </div>

    <div class="spectator-main">
      <div class="spectator-panel">
        <h3>📊 Fase</h3>
        <div id="spectator-phase" style="font-size:18px;color:#ff9900;font-weight:bold;">Aguardando...</div>
      </div>

      <div class="spectator-panel">
        <h3>👥 Jogadores</h3>
        <ul id="spectator-players"></ul>
      </div>

      <div class="spectator-panel">
        <h3>📰 Últimos Eventos</h3>
        <div id="spectator-last-action" style="color:#ccc;font-size:14px;">—</div>
      </div>

      <button onclick="leaveSpectator()" style="width:100%;padding:12px;background:#444;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;">Sair</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-database-compat.js"></script>
  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyBG4m7F2YEIPOduLGNniryltMNLXEtYnXQ",
      authDomain: "a-liar-within-v3.firebaseapp.com",
      databaseURL: "https://a-liar-within-v3-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "a-liar-within-v3",
      storageBucket: "a-liar-within-v3.firebasestorage.app",
      messagingSenderId: "170644517763",
      appId: "1:170644517763:web:08e0a2912cfec9d460bcb6"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentRoom = null;
    let currentRoomRef = null;
    let unsubscribe = null;

    // Extrair sala da URL
    const params = new URLSearchParams(window.location.search);
    const roomParam = params.get('room');

    // Entrar como espectador
    window.joinAsSpectator = async function() {
      const roomCode = document.getElementById('spectator-room-input').value.toUpperCase().trim();
      const errorDiv = document.getElementById('spectator-error');
      const btn = document.getElementById('spectator-join-btn');

      if (!roomCode || roomCode.length < 4) {
        errorDiv.textContent = 'Digite um código válido';
        errorDiv.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Conectando...';
      errorDiv.style.display = 'none';

      try {
        // Verificar se sala existe
        const roomRef = db.ref(`rooms/${roomCode}`);
        const snapshot = await roomRef.once('value');

        if (!snapshot.exists()) {
          errorDiv.textContent = 'Sala não encontrada';
          errorDiv.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Entrar';
          return;
        }

        currentRoom = roomCode;
        document.getElementById('spectator-room-code').textContent = roomCode;
        document.getElementById('spectator-join').style.display = 'none';
        document.getElementById('spectator-content').style.display = 'block';

        // Começar a escutar a sala
        listenToRoom(roomCode);
      } catch (e) {
        console.error('Erro ao conectar:', e);
        errorDiv.textContent = 'Erro ao conectar';
        errorDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    };

    // Permitir Enter para enviar
    document.getElementById('spectator-room-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') window.joinAsSpectator();
    });

    // Auto-entrar se o room for passado na querystring
    if (roomParam) {
      document.getElementById('spectator-room-input').value = roomParam.toUpperCase();
      // Pequeno delay para garantir que handlers estão prontos
      setTimeout(() => {
        window.joinAsSpectator();
      }, 200);
    }

    function listenToRoom(roomCode) {
      const roomRef = db.ref(`rooms/${roomCode}`);
      
      if (unsubscribe && currentRoomRef) {
        currentRoomRef.off('value', unsubscribe);
      }
      
      unsubscribe = (snapshot) => {
        const roomData = snapshot.val();
        if (!roomData) return;

        renderSpectatorView(roomData);
      };

      currentRoomRef = roomRef;
      roomRef.on('value', unsubscribe);
    }

    function renderSpectatorView(roomData) {
      // Fase
      const phase = (roomData.gameState && (roomData.gameState.phase || roomData.gameState.currentPhase)) || 'Aguardando...';
      document.getElementById('spectator-phase').textContent = phase;

      // Jogadores
      const players = roomData.players || {};
      const playersList = document.getElementById('spectator-players');
      playersList.innerHTML = '';

      Object.entries(players).forEach(([playerId, player]) => {
        const li = document.createElement('li');
        const isEliminated = roomData.eliminatedPlayers && roomData.eliminatedPlayers[playerId];
        
        if (isEliminated) {
          li.classList.add('eliminated');
          li.textContent = `${player.name} ❌ (Eliminado)`;
        } else {
          li.textContent = `${player.name} ✓`;
        }
        
        playersList.appendChild(li);
      });

      // Última ação
      const lastAction = (roomData.gameState && roomData.gameState.lastAction) || '—';
      document.getElementById('spectator-last-action').textContent = lastAction;
    }

    // Sair como espectador
    window.leaveSpectator = function() {
      if (unsubscribe && currentRoomRef) {
        currentRoomRef.off('value', unsubscribe);
      }
      currentRoom = null;
      currentRoomRef = null;
      document.getElementById('spectator-join').style.display = 'grid';
      document.getElementById('spectator-content').style.display = 'none';
      document.getElementById('spectator-room-input').value = '';
      document.getElementById('spectator-error').style.display = 'none';
      unsubscribe = null;
    };

    // Limpeza ao sair
    window.addEventListener('beforeunload', () => {
      if (unsubscribe && currentRoomRef) {
        currentRoomRef.off('value', unsubscribe);
      }
    });
  </script>
</body>
</html>
