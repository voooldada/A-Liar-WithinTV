<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>A Liar Within — TV Broadcast</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .tv-container {
      text-align: center;
      background: #222;
      padding: 40px;
      border-radius: 12px;
      max-width: 600px;
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
    }
    h1 {
      font-size: 32px;
      margin-bottom: 20px;
      color: #ff4444;
    }
    /* QR visuals removed: TV now connects via room code */
    .instructions {
      margin-top: 20px;
      color: #ccc;
      font-size: 14px;
      line-height: 1.6;
    }
    .instruction-step {
      margin: 10px 0;
      padding: 10px;
      background: #333;
      border-left: 3px solid #ff4444;
    }
    .tv-status {
      margin-top: 20px;
      padding: 10px;
      background: #2a2a2a;
      border-radius: 6px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="tv-container">
    <h1>🎮 A Liar Within</h1>
    <h2 style="font-size:18px;margin-bottom:10px;color:#ff9900;">Transmissão ao Vivo</h2>
    
    <div class="instructions">
      <div class="instruction-step">
        <strong>1.</strong> Abra o jogo no seu celular
      </div>
      <div class="instruction-step">
        <strong>2.</strong> Clique em "Conectar à TV" no lobby
      </div>
      <div class="instruction-step">
        <strong>3.</strong> No campo abaixo, cole o código da sala
      </div>
      <div class="instruction-step">
        <strong>4.</strong> Clique em "Conectar como Espectador" para exibir o lobby e fases
      </div>
    </div>

    <div class="tv-status">
      Status: <span id="tv-connection-status">Pronta para transmissão</span>
    </div>

    <div style="margin-top:18px;">
      <label style="display:block;margin-bottom:8px;color:#ccc;">Código da Sala</label>
      <input id="tv-room-input" placeholder="Cole o código da sala (ex: ABCD1234)" style="width:100%;padding:10px;border-radius:6px;border:1px solid #444;background:#111;color:#fff;margin-bottom:8px;" />
      <div style="display:flex;gap:8px;">
        <button id="tv-connect-button" style="flex:1;padding:10px;border-radius:6px;border:none;background:#ff4444;color:#fff;">Conectar como Espectador</button>
      </div>
      <div id="tv-connect-msg" style="margin-top:8px;color:#888;font-size:13px;"></div>
    </div>
  </div>

  <script>
    // Eventos do UI
    document.getElementById('tv-connect-button').addEventListener('click', () => {
      const room = document.getElementById('tv-room-input').value.toUpperCase().trim();
      const msg = document.getElementById('tv-connect-msg');
      if (!room) { msg.textContent = 'Digite o código da sala.'; return; }
      // Redirecionar para spectator.html com room (a página do espectador faz o auto-join)
      const url = 'spectator.html?room=' + encodeURIComponent(room);
      window.location.href = url;
    });
  </script>
</body>
</html>
