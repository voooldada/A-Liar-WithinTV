<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>A Liar Within — TV Broadcast</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .tv-container {
      text-align: center;
      background: #222;
      padding: 40px;
      border-radius: 12px;
      max-width: 600px;
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
    }
    h1 {
      font-size: 32px;
      margin-bottom: 20px;
      color: #ff4444;
    }
    .qr-box {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      display: flex;
      justify-content: center;
    }
    #qr-code {
      max-width: 400px;
      width: 100%;
    }
    .instructions {
      margin-top: 20px;
      color: #ccc;
      font-size: 14px;
      line-height: 1.6;
    }
    .instruction-step {
      margin: 10px 0;
      padding: 10px;
      background: #333;
      border-left: 3px solid #ff4444;
    }
    .tv-status {
      margin-top: 20px;
      padding: 10px;
      background: #2a2a2a;
      border-radius: 6px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="tv-container">
    <h1>🎮 A Liar Within</h1>
    <h2 style="font-size:18px;margin-bottom:10px;color:#ff9900;">Transmissão ao Vivo</h2>
    
    <div class="qr-box">
      <div id="qr-code"></div>
    </div>

    <div class="instructions">
      <div class="instruction-step">
        <strong>1.</strong> Abra o jogo no seu celular
      </div>
      <div class="instruction-step">
        <strong>2.</strong> Clique em "Conectar com TV" no lobby
      </div>
      <div class="instruction-step">
        <strong>3.</strong> Escaneie este código QR
      </div>
      <div class="instruction-step">
        <strong>4.</strong> Digite o código da sala
      </div>
    </div>

    <div class="tv-status">
      TV ID: <span id="tv-id">Gerando...</span><br>
      Status: <span id="tv-connection-status">Pronta para transmissão</span>
    </div>
  </div>

  <!-- Biblioteca QR Code -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
  <script>
    // Gerar ID único para esta TV
    let tvId = localStorage.getItem('tvId');
    if (!tvId) {
      tvId = 'TV-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
      localStorage.setItem('tvId', tvId);
    }

    document.getElementById('tv-id').textContent = tvId.slice(0, 12);

    // Gerar URL do espectador (onde usuários vão escanear)
    const spectatorUrl = window.location.origin + '/spectator?tv=' + encodeURIComponent(tvId);
    
    // Gerar QR Code
    const qrCodeDiv = document.getElementById('qr-code');
    new QRCode(qrCodeDiv, {
      text: spectatorUrl,
      width: 350,
      height: 350,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });

    console.log('📺 TV Broadcast URL:', spectatorUrl);
  </script>
</body>
</html>
